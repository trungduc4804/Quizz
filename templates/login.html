{% extends "base.html" %}

{% block header %}Hệ Thống Thành Viên{% endblock %}

{% block extra_head %}
<style>
    .auth-container {
        max-width: 400px;
        margin: 0 auto;
    }

    .tab-nav {
        display: flex;
        border-bottom: 2px solid var(--surface-border);
        margin-bottom: 2rem;
    }

    .tab-btn {
        flex: 1;
        background: transparent;
        border: none;
        color: var(--text-muted);
        padding: 1rem;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition);
        position: relative;
    }

    .tab-btn:hover {
        color: var(--text-main);
    }

    .tab-btn.active {
        color: var(--primary);
    }

    .tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -2px;
        left: 0;
        width: 100%;
        height: 2px;
        background: var(--primary);
        box-shadow: 0 -2px 10px var(--primary);
    }

    .auth-form {
        display: none;
    }

    .auth-form.active {
        display: block;
        animation: fadeIn 0.3s ease-out;
    }

    .alert {
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid var(--success);
        color: var(--success);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('login')">Đăng nhập</button>
        <button class="tab-btn" onclick="switchTab('register')">Đăng ký</button>
    </div>

    <!-- Màn hình Đăng nhập -->
    <form id="login-form" class="auth-form active" action="/login" method="post"
        onsubmit="showLoading('Đang đăng nhập...')">
        <div class="form-group">
            <label for="login-username">Tên đăng nhập</label>
            <input type="text" id="login-username" name="username" required placeholder="Nhập tên tài khoản">
        </div>
        <div class="form-group mb-8">
            <label for="login-password">Mật khẩu</label>
            <input type="password" id="login-password" name="password" required placeholder="Nhập mật khẩu"
                style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--surface-border); background: rgba(15, 23, 42, 0.5); color: var(--text-main); font-family: var(--font-family); font-size: 1rem;">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i class="fa-solid fa-right-to-bracket" style="margin-right: 8px;"></i> Đăng Nhập
        </button>
    </form>

    <!-- Màn hình Đăng ký -->
    <form id="register-form" class="auth-form" action="/register" method="post"
        onsubmit="showLoading('Đang tạo tài khoản...')">
        <div class="form-group">
            <label for="reg-username">Tên đăng nhập</label>
            <input type="text" id="reg-username" name="username" required placeholder="Chọn tên tài khoản">
        </div>
        <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" name="email" required placeholder="nhap@email.com"
                style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--surface-border); background: rgba(15, 23, 42, 0.5); color: var(--text-main); font-family: var(--font-family); font-size: 1rem;">
        </div>
        <div class="form-group mb-8">
            <label for="reg-password">Mật khẩu</label>
            <input type="password" id="reg-password" name="password" required placeholder="Tạo mật khẩu"
                style="width: 100%; padding: 0.75rem 1rem; border-radius: 8px; border: 1px solid var(--surface-border); background: rgba(15, 23, 42, 0.5); color: var(--text-main); font-family: var(--font-family); font-size: 1rem;">
        </div>
        <button type="submit" class="btn btn-secondary" style="width: 100%;">
            <i class="fa-solid fa-user-plus" style="margin-right: 8px;"></i> Đăng Ký Tài Khoản
        </button>
    </form>
</div>

{% endblock %}

{% block scripts %}
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const container = document.querySelector('.auth-container');

    if (urlParams.get('registered') === '1') {
        const alertHtml = '<div class="alert"><i class="fa-solid fa-circle-check"></i> Đăng ký thành công! Vui lòng đăng nhập.</div>';
        container.insertAdjacentHTML('afterbegin', alertHtml);
        // Dọn dẹp URL
        window.history.replaceState({}, document.title, window.location.pathname);
    } else if (urlParams.get('error') === 'credentials') {
        const errorHtml = '<div class="alert" style="background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger);"><i class="fa-solid fa-circle-exclamation"></i> Tên tài khoản hoặc mật khẩu không chính xác!</div>';
        container.insertAdjacentHTML('afterbegin', errorHtml);
        window.history.replaceState({}, document.title, window.location.pathname);
    } else if (urlParams.get('error') === 'username') {
        const errorHtml = '<div class="alert" style="background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger);"><i class="fa-solid fa-circle-exclamation"></i> Tên tài khoản đã tồn tại! Vui lòng chọn tên khác.</div>';
        container.insertAdjacentHTML('afterbegin', errorHtml);
        switchTab('register');
        window.history.replaceState({}, document.title, window.location.pathname);
    } else if (urlParams.get('error') === 'email') {
        const errorHtml = '<div class="alert" style="background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger);"><i class="fa-solid fa-circle-exclamation"></i> Email này đã được đăng ký! Vui lòng sử dụng email khác.</div>';
        container.insertAdjacentHTML('afterbegin', errorHtml);
        switchTab('register');
        window.history.replaceState({}, document.title, window.location.pathname);
    }

    function switchTab(tab) {
        // Update buttons
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        if (tab === 'login') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }

        // Update forms
        document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));
        document.getElementById(`${tab}-form`).classList.add('active');
    }
</script>
{% endblock %}
